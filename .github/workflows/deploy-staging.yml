name: Deploy Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  ci-check:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run tests
        run: go test -short -count=1 ./pkg/... ./services/...

  deploy-backend:
    name: Deploy Backend to Staging
    runs-on: ubuntu-latest
    needs: ci-check
    environment: staging
    steps:
      - name: Deploy to Staging VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/openpay
            ./deploy.sh staging
          script_stop: true
          command_timeout: 15m

  deploy-merchant-portal:
    name: Deploy Merchant Portal (Staging)
    runs-on: ubuntu-latest
    needs: ci-check
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: apps/merchant-portal/pnpm-lock.yaml

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel (Preview)
        working-directory: apps/merchant-portal
        run: |
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }} --scope=perfectus
          vercel build --token=${{ secrets.VERCEL_TOKEN }} --scope=perfectus
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --scope=perfectus)
          echo "Deployed to: $DEPLOY_URL"
          # Alias to stable staging domain if configured
          if [ -n "${{ secrets.MERCHANT_STAGING_DOMAIN }}" ]; then
            vercel alias set "$DEPLOY_URL" "${{ secrets.MERCHANT_STAGING_DOMAIN }}" --token=${{ secrets.VERCEL_TOKEN }} --scope=perfectus
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_MERCHANT_PROJECT_ID }}

  deploy-admin-dashboard:
    name: Deploy Admin Dashboard (Staging)
    runs-on: ubuntu-latest
    needs: ci-check
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: apps/admin-dashboard/pnpm-lock.yaml

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel (Preview)
        working-directory: apps/admin-dashboard
        run: |
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }} --scope=perfectus
          vercel build --token=${{ secrets.VERCEL_TOKEN }} --scope=perfectus
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --scope=perfectus)
          echo "Deployed to: $DEPLOY_URL"
          if [ -n "${{ secrets.ADMIN_STAGING_DOMAIN }}" ]; then
            vercel alias set "$DEPLOY_URL" "${{ secrets.ADMIN_STAGING_DOMAIN }}" --token=${{ secrets.VERCEL_TOKEN }} --scope=perfectus
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
