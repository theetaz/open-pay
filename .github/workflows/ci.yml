name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run go vet
        run: |
          packages=$(go list ./pkg/... ./services/... 2>/dev/null || true)
          if [ -n "$packages" ]; then
            go vet $packages
          else
            echo "No packages to vet"
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: olp
          POSTGRES_PASSWORD: olp_test_password
          POSTGRES_DB: olp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U olp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      nats:
        image: nats:2-alpine
        ports:
          - 4222:4222

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Discover Go packages
        id: packages
        run: |
          pkgs=$(go list ./pkg/... ./services/... 2>/dev/null || true)
          if [ -z "$pkgs" ]; then
            echo "packages=" >> $GITHUB_OUTPUT
            echo "No Go packages found to test"
          else
            echo "packages<<EOF" >> $GITHUB_OUTPUT
            echo "$pkgs" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Run tests with coverage
        if: steps.packages.outputs.packages != ''
        run: |
          go test -count=1 -race -coverprofile=coverage.out -covermode=atomic \
            ./pkg/... $(go list ./services/... 2>/dev/null || true)
        env:
          DATABASE_URL: postgres://olp:olp_test_password@localhost:5432/olp_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          NATS_URL: nats://localhost:4222

      - name: Upload coverage
        if: steps.packages.outputs.packages != '' && hashFiles('coverage.out') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build services
        run: |
          built=0
          for svc in gateway payment merchant settlement webhook exchange subscription notification admin; do
            if [ -f "services/$svc/cmd/main.go" ]; then
              echo "Building $svc..."
              go build -o bin/$svc ./services/$svc/cmd/
              built=$((built + 1))
            fi
          done
          echo "Built $built services"

      - name: Verify Go module is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
