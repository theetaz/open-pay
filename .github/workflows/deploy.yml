name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/openpay
            git fetch origin main
            git reset --hard origin/main
            ./deploy.sh
          script_stop: true
          command_timeout: 15m

  deploy-merchant-portal:
    name: Deploy Merchant Portal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: apps/merchant-portal/pnpm-lock.yaml

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        working-directory: apps/merchant-portal
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --scope=perfectus
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --scope=perfectus
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --scope=perfectus
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_MERCHANT_PROJECT_ID }}

  deploy-admin-dashboard:
    name: Deploy Admin Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: apps/admin-dashboard/pnpm-lock.yaml

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        working-directory: apps/admin-dashboard
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --scope=perfectus
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --scope=perfectus
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --scope=perfectus
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
