global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:8080']
  - job_name: 'payment'
    static_configs:
      - targets: ['payment:8081']
  - job_name: 'merchant'
    static_configs:
      - targets: ['merchant:8082']
  - job_name: 'settlement'
    static_configs:
      - targets: ['settlement:8083']
  - job_name: 'webhook'
    static_configs:
      - targets: ['webhook:8084']
  - job_name: 'exchange'
    static_configs:
      - targets: ['exchange:8085']
  - job_name: 'subscription'
    static_configs:
      - targets: ['subscription:8086']
