# Air configuration for Go hot reload
# This is a template — the start-dev.sh script overrides cmd/bin per service

root = "."

[build]
  # Overridden per-service by start-dev.sh
  cmd = "go build -o ./tmp/main ./services/gateway/cmd/"
  bin = "./tmp/main"
  delay = 1000
  exclude_dir = ["bin", "tmp", "node_modules", "dist", "apps", "migrations", "scripts", "config", "e2e", ".git", ".pids"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "0s"
  send_interrupt = true
  stop_on_error = true

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
