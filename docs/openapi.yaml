      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                type:
                  type: string
                  description: Document type
      responses:
        "201":
          description: File uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      url:
                        type: string
                      key:
                        type: string
    delete:
      tags: [Merchants]
      summary: Delete an uploaded file
      operationId: deleteFile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/StatusOk"

  # ─── Public Director Verification ───────────────────────
  /v1/public/directors/verify/{token}:
    get:
      tags: [Merchants]
      summary: Get director verification details by token (public)
      operationId: getDirectorByToken
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Director and merchant details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      director:
                        $ref: "#/components/schemas/Director"
                      merchant:
                        $ref: "#/components/schemas/Merchant"
    post:
      tags: [Merchants]
      summary: Submit director verification (public)
      operationId: submitDirectorVerification
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                nicNumber:
                  type: string
                nicFrontUrl:
                  type: string
                nicBackUrl:
                  type: string
      responses:
        "200":
          description: Verification submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Director"

  # ─── Sandbox ─────────────────────────────────────────────
  /test/simulate/{providerPayID}:
    post:
      tags: [System]
      summary: Simulate a payment confirmation (sandbox only)
      operationId: simulatePayment
      parameters:
        - name: providerPayID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment simulated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: simulated
                      providerPayId:
                        type: string

  # ─── SDK Routes (HMAC Auth) ─────────────────────────────
  /v1/sdk/payments:
    post:
      tags: [SDK]
      summary: Create a payment via SDK
      operationId: sdkCreatePayment
      security:
        - HmacAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentRequest"
      responses:
        "201":
          description: Payment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Payment"
    get:
      tags: [SDK]
      summary: List payments via SDK
      operationId: sdkListPayments
      security:
        - HmacAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated payment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Payment"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

  /v1/sdk/payments/{id}:
    get:
      tags: [SDK]
      summary: Get payment via SDK
      operationId: sdkGetPayment
      security:
        - HmacAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Payment details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Payment"

  /v1/sdk/checkout/sessions:
    post:
      tags: [SDK]
      summary: Create a checkout session (Stripe-like flow)
      operationId: sdkCreateCheckoutSession
      security:
        - HmacAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutSessionRequest"
      responses:
        "201":
          description: Checkout session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CheckoutSession"

  /v1/sdk/webhooks/configure:
    post:
      tags: [SDK]
      summary: Configure webhook via SDK
      operationId: sdkConfigureWebhook
      security:
        - HmacAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
      responses:
        "201":
          description: Webhook configured
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/WebhookConfig"

  /v1/sdk/webhooks/public-key:
    get:
      tags: [SDK]
      summary: Get webhook public key via SDK
      operationId: sdkGetWebhookPublicKey
      security:
        - HmacAuth: []
      responses:
        "200":
          description: Public key
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      publicKey:
                        type: string

  /v1/sdk/webhooks/test:
    post:
      tags: [SDK]
      summary: Test webhook via SDK
      operationId: sdkTestWebhook
      security:
        - HmacAuth: []
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                      deliveryId:
                        type: string
                        format: uuid
                      status:
                        type: string
                      deliveryTime:
                        type: integer

  # ─── Merchant Audit Logs ─────────────────────────────────
  /v1/merchant/audit-logs:
    get:
      tags: [Merchants]
      summary: Get audit logs for current merchant
      operationId: getMerchantAuditLogs
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditLogEntry"

  # ─── Admin Auth ──────────────────────────────────────────
  /v1/admin/auth/login:
    post:
      tags: [System]
      summary: Admin login
      operationId: adminLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Admin login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      refreshToken:
                        type: string

  /v1/admin/auth/refresh:
    post:
      tags: [System]
      summary: Admin token refresh
      operationId: adminRefreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Tokens refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      refreshToken:
                        type: string

  # ─── Legal Documents (public) ────────────────────────────
  /v1/legal-documents/active:
    get:
      tags: [System]
      summary: Get active legal documents (public)
      operationId: getActiveLegalDocuments
      responses:
        "200":
          description: Active legal documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        type:
                          type: string
                        title:
                          type: string
                        content:
                          type: string
                        version:
                          type: string

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from /v1/auth/login or /v1/auth/refresh

    HmacAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: |
        HMAC-SHA256 authentication for SDK access. Requires three headers:
        - `x-api-key`: Your API key ID
        - `x-timestamp`: Unix timestamp (seconds)
        - `x-signature`: HMAC-SHA256(apiSecret, timestamp + method + path + body)

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1

    PerPage:
      name: perPage
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: UNAUTHORIZED
              message: missing authentication

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: NOT_FOUND
              message: resource not found

    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: VALIDATION_ERROR
              message: invalid input

    StatusOk:
      description: Operation successful
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  status:
                    type: string

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        perPage:
          type: integer

    RegisterRequest:
      type: object
      required: [businessName, email, password, name]
      properties:
        businessName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
        phone:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/User"
        merchant:
          $ref: "#/components/schemas/Merchant"

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
        isActive:
          type: boolean
        branchId:
          type: string
          format: uuid

    Merchant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        businessName:
          type: string
        businessType:
          type: string
        registrationNo:
          type: string
        website:
          type: string
        contactEmail:
          type: string
          format: email
        contactPhone:
          type: string
        contactName:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
        city:
          type: string
        district:
          type: string
        postalCode:
          type: string
        country:
          type: string
        kycStatus:
          type: string
          enum: [PENDING, SUBMITTED, APPROVED, REJECTED]
        status:
          type: string
          enum: [PENDING, ACTIVE, INACTIVE, FROZEN, TERMINATED]
        createdAt:
          type: string
          format: date-time

    UpdateMerchantRequest:
      type: object
      properties:
        businessName:
          type: string
        businessType:
          type: string
        registrationNo:
          type: string
        website:
          type: string
        contactPhone:
          type: string
        contactName:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
        city:
          type: string
        district:
          type: string
        postalCode:
          type: string
        country:
          type: string
        logoUrl:
          type: string

    Director:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        fullName:
          type: string
        status:
          type: string
          enum: [PENDING, VERIFIED]
        createdAt:
          type: string
          format: date-time

    ApiKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
        keyId:
          type: string
        name:
          type: string
        environment:
          type: string
          enum: [sandbox, production]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreatePaymentRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: string
          description: Payment amount as a decimal string
          example: "100.00"
        currency:
          type: string
          default: USDT
          description: Payment currency (USDT, LKR)
        provider:
          type: string
          default: TEST
          description: Payment provider
        merchantTradeNo:
          type: string
