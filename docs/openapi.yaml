openapi: 3.0.3
info:
  title: Open Pay API
  version: 1.0.0
  description: |
    Open Pay is a crypto payment gateway platform that enables merchants to accept
    cryptocurrency payments (USDT) with automatic fiat conversion. This specification
    documents all public and SDK REST API endpoints exposed through the API gateway.
  contact:
    name: Open Pay Support
    url: https://olp-api.nipuntheekshana.com
  license:
    name: MIT

servers:
  - url: https://olp-api.nipuntheekshana.com
    description: Production

tags:
  - name: Auth
    description: Merchant authentication (register, login, token refresh, 2FA)
  - name: Merchants
    description: Merchant profile and management
  - name: API Keys
    description: API key management for SDK access
  - name: Payments
    description: Payment creation, listing, and checkout
  - name: Payment Links
    description: Reusable and single-use payment link management
  - name: Settlements
    description: Merchant balance and settlement credit
  - name: Withdrawals
    description: Withdrawal requests and lifecycle
  - name: Refunds
    description: Refund requests and lifecycle
  - name: Webhooks
    description: Webhook configuration, testing, and delivery logs
  - name: Subscriptions
    description: Subscription plans and subscriber management
  - name: Direct Debit
    description: Direct debit contracts and payments
  - name: Exchange Rates
    description: Live exchange rate queries
  - name: SDK
    description: HMAC-authenticated SDK endpoints
  - name: System
    description: Health checks and platform configuration

security: []

paths:
  # ─── System ──────────────────────────────────────────────
  /healthz:
    get:
      tags: [System]
      summary: Liveness probe
      operationId: healthz
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /readyz:
    get:
      tags: [System]
      summary: Readiness probe
      operationId: readyz
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /v1/system/health:
    get:
      tags: [System]
      summary: Downstream service health check
      operationId: systemHealth
      responses:
        "200":
          description: Health status of all services
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        status:
                          type: string
                          enum: [healthy, unhealthy]
                        responseTime:
                          type: integer
                          description: Response time in milliseconds

  /v1/platform/config:
    get:
      tags: [System]
      summary: Platform fee configuration
      operationId: platformConfig
      responses:
        "200":
          description: Current platform fee percentages
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      platformFeePct:
                        type: string
                        example: "1.5"
                      exchangeFeePct:
                        type: string
                        example: "0.5"

  # ─── Auth ────────────────────────────────────────────────
  /v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new merchant account
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Merchant registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate a merchant user
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Account inactive, frozen, or terminated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Tokens refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current user and merchant profile
      operationId: getMe
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/User"
                      merchant:
                        $ref: "#/components/schemas/Merchant"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Account frozen or terminated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/change-password:
    post:
      tags: [Auth]
      summary: Change current user password
      operationId: changePassword
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: password_changed
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/2fa/setup:
    post:
      tags: [Auth]
      summary: Generate TOTP secret for 2FA setup
      operationId: setup2fa
      security:
        - BearerAuth: []
      responses:
        "200":
          description: TOTP setup details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      secret:
                        type: string
                      uri:
                        type: string
                        description: OTP auth URI for QR code generation
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/2fa/verify:
    post:
      tags: [Auth]
      summary: Verify TOTP code and enable 2FA
      operationId: verify2fa
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  description: 6-digit TOTP code
      responses:
        "200":
          description: 2FA enabled, returns recovery codes
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      recoveryCodes:
                        type: array
                        items:
                          type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/2fa/disable:
    post:
      tags: [Auth]
      summary: Disable 2FA
      operationId: disable2fa
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        "200":
          description: 2FA disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: 2fa_disabled
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Merchants ───────────────────────────────────────────
  /v1/merchants:
    get:
      tags: [Merchants]
      summary: List merchants
      operationId: listMerchants
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, ACTIVE, INACTIVE, FROZEN, TERMINATED]
      responses:
        "200":
          description: Paginated merchant list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Merchant"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/merchants/{id}:
    get:
      tags: [Merchants]
      summary: Get merchant by ID
      operationId: getMerchant
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Merchant details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Merchant"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Merchants]
      summary: Update merchant profile
      operationId: updateMerchant
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMerchantRequest"
      responses:
        "200":
          description: Merchant updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Merchant"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/merchants/{id}/approve:
    post:
      tags: [Merchants]
      summary: Approve a merchant
      operationId: approveMerchant
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                forceReason:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/StatusOk"

  /v1/merchants/{id}/reject:
    post:
      tags: [Merchants]
      summary: Reject a merchant
      operationId: rejectMerchant
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/StatusOk"

  /v1/merchants/{id}/deactivate:
    post:
      tags: [Merchants]
      summary: Deactivate a merchant
      operationId: deactivateMerchant
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          $ref: "#/components/responses/StatusOk"

  /v1/merchants/{id}/freeze:
    post:
      tags: [Merchants]
      summary: Freeze a merchant account
      operationId: freezeMerchant
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/StatusOk"

  /v1/merchants/{id}/unfreeze:
    post:
      tags: [Merchants]
      summary: Unfreeze a merchant account
      operationId: unfreezeMerchant
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          $ref: "#/components/responses/StatusOk"

  /v1/merchants/{id}/terminate:
    post:
      tags: [Merchants]
      summary: Terminate a merchant account
      operationId: terminateMerchant
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/StatusOk"

  /v1/merchants/{id}/documents:
    get:
      tags: [Merchants]
      summary: Get merchant KYC documents
      operationId: getMerchantDocuments
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: List of merchant documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        type:
                          type: string
                        url:
                          type: string
                        uploadedAt:
                          type: string
                          format: date-time

  /v1/merchants/{id}/directors:
    post:
      tags: [Merchants]
      summary: Add a director to a merchant
      operationId: createDirector
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "201":
          description: Director created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Director"
    get:
      tags: [Merchants]
      summary: List directors for a merchant
      operationId: listDirectors
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: List of directors
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Director"

  /v1/merchants/{id}/directors/{directorId}/resend:
    post:
      tags: [Merchants]
      summary: Resend director verification email
      operationId: resendDirectorVerification
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - name: directorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          $ref: "#/components/responses/StatusOk"

  /v1/merchants/{id}/directors/{directorId}:
    delete:
      tags: [Merchants]
      summary: Remove a director
      operationId: removeDirector
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - name: directorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          $ref: "#/components/responses/StatusOk"

  # ─── API Keys ────────────────────────────────────────────
  /v1/api-keys:
    post:
      tags: [API Keys]
      summary: Create a new API key
      operationId: createApiKey
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [environment, name]
              properties:
                environment:
                  type: string
                  enum: [sandbox, production]
                name:
                  type: string
      responses:
        "201":
          description: API key created (secret shown only once)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      keyId:
                        type: string
                      secret:
                        type: string
                        description: Only returned on creation
                      name:
                        type: string
                      environment:
                        type: string
                      createdAt:
                        type: string
                        format: date-time
    get:
      tags: [API Keys]
      summary: List API keys
      operationId: listApiKeys
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of API keys (secrets masked)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiKey"

  /v1/api-keys/{id}:
    delete:
      tags: [API Keys]
      summary: Revoke an API key
      operationId: revokeApiKey
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/StatusOk"

  # ─── Payments ────────────────────────────────────────────
  /v1/payments:
    post:
      tags: [Payments]
      summary: Create a new payment
      operationId: createPayment
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentRequest"
      responses:
        "201":
          description: Payment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Payment"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      tags: [Payments]
      summary: List payments for current merchant
      operationId: listPayments
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, PAID, EXPIRED, FAILED]
        - name: branchId
          in: query
          schema:
            type: string
            format: uuid
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated payment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Payment"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/payments/{id}:
    get:
      tags: [Payments]
      summary: Get payment by ID
      operationId: getPayment
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Payment details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Payment"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/payments/export/csv:
    get:
      tags: [Payments]
      summary: Export payments as CSV
      operationId: exportPaymentsCsv
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string
                format: binary

  /v1/public/payments:
    post:
      tags: [Payments]
      summary: Create a payment via payment link (no auth)
      operationId: createPublicPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [merchantId, amount]
              properties:
                merchantId:
                  type: string
                  format: uuid
                amount:
                  type: string
                  example: "100.00"
                currency:
                  type: string
                  default: USDT
                provider:
                  type: string
                  default: TEST
                merchantTradeNo:
                  type: string
                customerEmail:
                  type: string
                  format: email
                branchId:
                  type: string
                  format: uuid
      responses:
        "201":
          description: Payment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Payment"

  /v1/payments/{id}/checkout:
    get:
      tags: [Payments]
      summary: Get checkout details for customer (public)
      operationId: getCheckout
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Checkout details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CheckoutResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/payments/{id}/callback:
    post:
      tags: [Payments]
      summary: Handle provider payment callback
      operationId: handlePaymentCallback
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Callback processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: processed

  # ─── Payment Links ──────────────────────────────────────
  /v1/payment-links:
    post:
      tags: [Payment Links]
      summary: Create a payment link
      operationId: createPaymentLink
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentLinkRequest"
      responses:
        "201":
          description: Payment link created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/PaymentLink"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          description: Duplicate slug
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      tags: [Payment Links]
      summary: List payment links
      operationId: listPaymentLinks
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: branchId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Paginated payment links
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PaymentLink"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

  /v1/payment-links/check-slug/{slug}:
    get:
      tags: [Payment Links]
      summary: Check slug availability
      operationId: checkPaymentLinkSlug
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
