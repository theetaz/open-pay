        successUrl:
          type: string
          format: uri
        cancelUrl:
          type: string
          format: uri
        customerEmail:
          type: string
          format: email
        branchId:
          type: string
          format: uuid
        orderExpireTime:
          type: string
          format: date-time
        customerBilling:
          type: object
          properties:
            firstName:
              type: string
            lastName:
              type: string
            email:
              type: string
              format: email
            phone:
              type: string
            address:
              type: string
        goods:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
              mccCode:
                type: string

    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        merchantId:
          type: string
          format: uuid
        paymentNo:
          type: string
        merchantTradeNo:
          type: string
        amount:
          type: string
        currency:
          type: string
        amountUsdt:
          type: string
        provider:
          type: string
        providerPayId:
          type: string
        qrContent:
          type: string
        checkoutLink:
          type: string
        deepLink:
          type: string
        status:
          type: string
          enum: [PENDING, PAID, EXPIRED, FAILED]
        customerEmail:
          type: string
        txHash:
          type: string
        feeBreakdown:
          $ref: "#/components/schemas/FeeBreakdown"
        exchangeRate:
          type: string
        expireTime:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        paidAt:
          type: string
          format: date-time
        branchId:
          type: string
          format: uuid
        successUrl:
          type: string
        cancelUrl:
          type: string

    FeeBreakdown:
      type: object
      properties:
        grossAmountUSDT:
          type: string
        exchangeFeePercentage:
          type: string
        exchangeFeeAmountUSDT:
          type: string
        ceypayFeePercentage:
          type: string
        ceypayFeeAmountUSDT:
          type: string
        totalFeesUSDT:
          type: string
        netAmountUSDT:
          type: string
        grossAmountLKR:
          type: string
        exchangeFeeAmountLKR:
          type: string
        ceypayFeeAmountLKR:
          type: string
        totalFeesLKR:
          type: string
        netAmountLKR:
          type: string

    CheckoutResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        paymentNo:
          type: string
        amount:
          type: string
        currency:
          type: string
        amountUsdt:
          type: string
        qrContent:
          type: string
        deepLink:
          type: string
        status:
          type: string
        exchangeRate:
          type: string
        expireTime:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        paidAt:
          type: string
          format: date-time

    CreateCheckoutSessionRequest:
