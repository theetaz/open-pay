          format: uuid
        paymentId:
          type: string
          format: uuid
        paymentNo:
          type: string
        amountUsdt:
          type: string
        reason:
          type: string
        status:
          type: string
          enum: [PENDING, APPROVED, COMPLETED, REJECTED]
