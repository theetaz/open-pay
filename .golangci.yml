version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - bodyclose
    - misspell
    - gocritic
  settings:
    gocritic:
      enabled-checks:
        - dupBranchBody
        - dupCase
        - dupSubExpr
  exclusions:
    paths:
      - vendor
      - contracts
      - apps
      - plugins
      - sdks
      - docs
      - scripts
      - config
      - migrations

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
