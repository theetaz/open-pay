run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - bodyclose
    - misspell
    - gocritic

linters-settings:
  gocritic:
    enabled-checks:
      - dupBranchBody
      - dupCase
      - dupSubExpr

issues:
  exclude-dirs:
    - vendor
    - contracts
  max-issues-per-linter: 50
  max-same-issues: 10
